<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Recorder</title>
    <link rel="stylesheet" href="live_transcription.css" />
</head>

<body>
    <div class="header-container">
        <div class="settings-container">
            <div class="buttons-container">
                <button id="recordButton">
                    <div class="shape-container">
                        <div class="shape"></div>
                    </div>
                    <div class="recording-info">
                        <div class="wave-container">
                            <canvas id="waveCanvas"></canvas>
                        </div>
                        <div class="timer">00:00</div>
                    </div>
                </button>

                <div class="field">
                    <label id="microphoneSelectLabel" for="microphoneSelect">语音来源</label>
                    <select id="microphoneSelect">
                        <option value="">Default</option>
                        <option value="__desktop__">桌面声音</option>
                    </select>
                </div>

                <div class="field">
                    <label for="languageSelect">语言</label>
                    <select id="languageSelect">
                        <option value="zh">中文</option>
                        <option value="auto">自动检测</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                    </select>
                </div>

                <button id="openSettingsButton" class="secondary-button" type="button">设置</button>
                <button id="exportJsonlButton" class="secondary-button" type="button">导出 JSONL</button>
            </div>
        </div>
        
        <p id="status"></p>
    </div>

    <div id="settingsModal" class="modal-backdrop hidden" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
            <div class="modal-header">
                <h2 id="settingsModalTitle">总结与 API 设置</h2>
                <button id="closeSettingsButton" class="secondary-button" type="button">关闭</button>
            </div>
            <div class="config-grid">
                <div class="field field-wide">
                    <label for="templateSelect">模板</label>
                    <select id="templateSelect"></select>
                </div>

                <div class="field field-wide">
                    <label for="systemPromptInput">System Prompt</label>
                    <textarea id="systemPromptInput" rows="4" placeholder="输入 system prompt"></textarea>
                </div>

                <div class="field field-wide">
                    <label for="userPromptInput">User Prompt</label>
                    <textarea id="userPromptInput" rows="4" placeholder="输入 user prompt，支持 {{text}}"></textarea>
                </div>

                <div class="field">
                    <label for="apiUrlInput">API URL</label>
                    <input id="apiUrlInput" type="text" placeholder="http://localhost:11434/v1" />
                </div>

                <div class="field">
                    <label for="apiKeyInput">API Key</label>
                    <input id="apiKeyInput" type="password" placeholder="可留空" />
                </div>

                <div class="field">
                    <label for="modelInput">模型名</label>
                    <input id="modelInput" type="text" placeholder="llama3.2" />
                </div>
            </div>
            <div class="config-actions">
                <button id="saveSummaryConfigButton" class="secondary-button" type="button">保存总结配置</button>
            </div>
        </div>
    </div>

    <div class="transcript-container">
        <div id="linesTranscript"></div>
    </div>

    <script src="live_transcription.js"></script>
</body>

</html>
